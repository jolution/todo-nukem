# TODO NUKEM - PR Ticket Link Action
# Automatically adds ticket links to PR descriptions based on branch names
# https://github.com/jolution/todo-nukem

name: "TODO NUKEM PR Ticket Link"
description: "Automatically adds ticket links to PR descriptions based on branch names"
author: "jolution"

branding:
  icon: "external-link"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token for API access"
    required: true
    default: ${{ github.token }}
  hidePromotion:
    description: "Hide the 'via TODO NUKEM' promotion link"
    required: false
    default: "false"
  linkStyle:
    description: "Format of the ticket reference: 'markdown' for a Markdown link or 'plaintext' for plain text (e.g. for Azure DevOps auto-linking via AB#123)"
    required: false
    default: "markdown"

runs:
  using: "composite"
  steps:
    - name: Migration notice
      shell: bash
      run: |
        echo "::notice::This action has moved to its own repository. Please update your workflow to use: jolution/todo-nukem-pr-ticket-link@v1"

    - name: Run TODO NUKEM PR Ticket Link
      uses: jolution/todo-nukem-pr-ticket-link@v1
      with:
        github-token: ${{ inputs.github-token }}
        hidePromotion: ${{ inputs.hidePromotion }}
        linkStyle: ${{ inputs.linkStyle }}
